services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434" 
    volumes:
      - ollama-exmatai:/root/.ollama
      - ./ollama-pull.sh:/ollama-pull.sh
    container_name: ollama-exmatai
    tty: true
    restart: unless-stopped
    entrypoint: ["/usr/bin/bash", "/ollama-pull.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all  
              capabilities: [gpu]
 
volumes:
  ollama-exmatai: {}

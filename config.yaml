# ExMat AI Configuration

# Model Settings
models:
  ocr:
    name: "deepseek-ocr"
    venv_path: "./DeepSeek-OCR/.venv"
    script_path: "./DeepSeek-OCR/DeepSeek-OCR-master/DeepSeek-OCR-vllm/run_dpsk_ocr_pdf.py"
    config_path: "./DeepSeek-OCR/DeepSeek-OCR-master/DeepSeek-OCR-vllm/config.py"
    params:
      base_size: 1024
      image_size: 640
      crop_mode: true
      min_crops: 2
      max_crops: 6
      max_concurrency: 100
      num_workers: 64

  text_llm:
    name: "qwen3.5:35b"
    platform: "ollama"
    base_url: "http://localhost:11434"
    params:
      temperature: 0.0

  vision_llm:
    name: "qwen3-vl:32b"
    platform: "ollama"
    base_url: "http://localhost:11434"
    params:
      temperature: 0.0

  structure_detection:
    repo_id: "UniParser/MolDetv2"
    filename: "moldet_v2_yolo11n_640_general.pt"
    params:
      imgsz: 640
      conf: 0.5
      device: 0

# Processing Settings
processing:
  temp_dir: "temp"

# Output Settings
output:
  directory: "outputs"
  format: "json"
  indent: 4
  save_intermediate: true

# Logging
logging:
  level: "INFO"
  file: "logs/exmatai.log"
  format: "%(asctime)s | %(levelname)s | %(message)s"
  console_output: true

# Error Handling
error_handling:
  continue_on_error: true
  max_retries: 3
  save_partial_results: true
